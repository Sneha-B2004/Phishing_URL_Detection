<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PhishGuard</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #ffffff; }
      .wrap { padding: 12px; }
      h3 { margin: 0 0 8px 0; }
      input { width: 100%; padding: 8px; border-radius: 10px; border: 1px solid #ddd; }
      button { width: 100%; padding: 10px; border: 0; border-radius: 10px; cursor: pointer; margin-top: 8px; }
      .box { margin-top: 10px; padding: 10px; border-radius: 10px; background: #f4f4f4; font-weight: bold; }
      .small { font-size: 12px; opacity: 0.8; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h3>PhishGuard</h3>
      <input id="url" placeholder="URL will auto-fill" />
      <button id="check">Check</button>
      <div class="box" id="result">Ready</div>
      <div class="small" id="score"></div>
    </div>
    <script src="iframe.js"></script>
  </body>
</html>
